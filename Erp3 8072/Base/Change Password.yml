info:
  name: Change Password
  type: http
  seq: 3

http:
  method: POST
  url: "{{LocalUrl}}/web/session/change_user_password"
  body:
    type: json
    data: |-
      {
          "params": {
              "data": {
                  "old_password": "123",
                  "new_password": "12345",
                  "confirm_password": "12345"
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
